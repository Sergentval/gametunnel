# GameTunnel — recommended kernel networking tuning
#
# Apply on BOTH the VPS server and the home agent for best throughput.
#
# Install:
#   sudo cp 99-gametunnel.conf /etc/sysctl.d/
#   echo "tcp_bbr" | sudo tee /etc/modules-load.d/bbr.conf
#   sudo modprobe tcp_bbr
#   sudo sysctl -p /etc/sysctl.d/99-gametunnel.conf
#
# Without these settings, downloads from CDNs (Steam, etc.) over the tunnel
# can be capped at <2 MB/s by TCP CUBIC's conservative slow-start. With BBR
# + larger buffers, the same downloads saturate the link (~50+ MB/s observed
# for a typical residential 1 Gbps fibre connection to Steam CDN).

# ── Required for game traffic forwarding ────────────────────────────────
net.ipv4.ip_forward = 1
net.ipv4.conf.all.rp_filter = 0
net.ipv4.conf.all.accept_local = 1

# ── BBR congestion control ──────────────────────────────────────────────
# Replaces CUBIC. Far better for long-distance / high-bandwidth links
# (Steam CDN, game asset downloads, anything with a large bandwidth-delay
# product). Requires fq qdisc.
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# ── TCP buffer sizing for high-bandwidth long paths ─────────────────────
# 64 MB max — enough for 10 Gbps × 50ms RTT (~60 MB BDP). Linux dynamically
# scales between min and max per connection.
net.core.rmem_max = 67108864
net.core.wmem_max = 67108864
net.ipv4.tcp_rmem = 4096 262144 67108864
net.ipv4.tcp_wmem = 4096 65536 67108864

# ── TCP Fast Open ───────────────────────────────────────────────────────
# Saves an RTT on connection setup for repeat connections (Steam reconnects,
# game client polls). Mode 3 = both client and server.
net.ipv4.tcp_fastopen = 3
