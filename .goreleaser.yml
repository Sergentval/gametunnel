version: 2
project_name: gametunnel

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: gametunnel
    main: ./cmd/gametunnel
    binary: gametunnel
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - configs/*
      - deploy/scripts/setup-kernel.sh

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^test:'

release:
  github:
    owner: Sergentval
    name: gametunnel
